services:
  - type: web
    name: telegram-growth-engine
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPERADMIN_IDS
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "10000"
      - key: WEBHOOK_URL
        sync: false
      - key: USE_WEBHOOK
        value: "true"
      - key: CLONE_ENCRYPTION_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"
